log:
  debug: true

artifact:
  temp_dir: "/tmp/etask/artifacts"
  # 存储驱动类型：local 或 s3
  storage:
    driver: "local"
    local:
      root: "/var/lib/etask/artifact-store"
    s3:
      endpoint: "http://minio:9000"
      secure: false
      region: "us-east-1"
      bucket: "etask-artifacts"
      prefix: "codebook"
      access_key: ""
      secret_key: ""
      session_token: ""

mysql:
  dsn: "root:123456@tcp(127.0.0.1:3306)/etask?charset=utf8mb4&collation=utf8mb4_general_ci&parseTime=True&loc=Local&timeout=1s&readTimeout=3s&writeTimeout=3s&multiStatements=true&interpolateParams=true"

redis:
  addr: "127.0.0.1:6379"
  password: "1234567890"

encryption:
  version: "V1"
  key: "1234567890"

kafka:
  network: tcp
  addresses:
    - 127.0.0.1:9094

etcd:
  endpoints:
    - 127.0.0.1:2379

web:
  host: "0.0.0.0"
  port: 8765

policy:
  auth_url: http://127.0.0.1:8000

# Codebook AI 助手，仅 Scheduler/Web 控制面使用。
# API Key 通过供应商对应的环境变量注入，不写入配置文件。
ai:
  provider: "openai" # 可选 openai、rawchat、qwen
  endpoint: "https://api.openai.com/v1"
  model: "gpt-5.6-sol"
  timeout: "180s"
  max_output_tokens: 8192
  max_concurrency: 4
  reasoning_effort: "low" # 限制隐藏推理消耗，为代码和文本输出保留预算

grpc:
  server:
    scheduler:
      name: scheduler
      listen_addr: "0.0.0.0:9002"
      # 广播地址，留空则自动检测
      advertise_addr: ""
      # 身份认证 Token，留空则不启用
      auth_token: ""
  client:
    # 调度中心访问 Executor 时使用，需与 Executor Server 的 auth_token 一致
    executor:
      auth_token: ""

scheduler:
  # 批量获取任务的超时时间（纳秒）
  batchTimeout: 3000000000
  # 每次调度循环扫描的最大任务数
  batchSize: 100
  # 任务抢占超时时间（纳秒）
  preemptedTimeout: 600000000000
  # 核心调度循环间隔（纳秒）
  scheduleInterval: 10000000000
  # 任务续约间隔（纳秒）
  renewInterval: 5000000000
  maxConcurrentTasks: 1000
  # 任务执行令牌获取超时时间（纳秒）
  tokenAcquireTimeout: 3000000000
  # 轮询扫描未处理任务的最小间隔时间（纳秒）
  pollInterval: 1000000000
  # 节点状态和结果上报超时时间（纳秒）
  reportTimeout: 10000000000

compensator:
  retry:
    maxRetryCount: 3
    # 任务准备阶段的超时窗口（纳秒）
    prepareTimeoutWindowMs: 10000000000
    batchSize: 100
    # 重试补偿执行的最小间隔（纳秒）
    minDuration: 1000000000
  reschedule:
    batchSize: 100
    # 重新调度补偿执行的最小间隔（纳秒）
    minDuration: 1000000000
  interrupt:
    batchSize: 100
    # 中断补偿执行的最小间隔（纳秒）
    minDuration: 1000000000
