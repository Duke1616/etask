# ework-runner 全量配置文件 (all-in-one 模式示例)

log:
  debug: true

agent:
  name: "Kafka-Agent"
  topic: "agent_execute"
  worker_count: 4
  desc: "异步任务执行代理：负责从消息队列拉取并执行来自调度中心的任务指令"
  # 资源池隔离级别：SHARED(共享) 或 DEDICATED(专有)
  isolation_level: "SHARED"
  artifact_cache:
    dir: "/var/lib/etask/agent-artifact-cache"
    # 单个压缩制品最大下载限制
    max_download_size: "512MB"
    # 单个制品最大解压限制
    max_unpacked_size: "2GB"
    # 单个制品最大文件数限制
    max_file_count: 10000
    # 本地缓存最大大小限制
    max_cache_size: "10GB"

runtime:
  script:
    workspace_dir: "/tmp/etask/runs"
    # 历史工作目录保留时间
    workspace_max_age: 24h
    python_binary: "python"
    shell_binary: "/bin/bash"
    # 脚本代码最大限制
    max_code_size: "4MB"
    # 脚本入参最大限制
    max_args_size: "1MB"
    # 环境变量最大限制
    max_variables_size: "1MB"
    # 单行日志最大限制
    max_log_line_size: "1MB"
    # 脚本执行结果最大限制
    max_result_size: "4MB"
    archive:
      enabled: true
      # 是否仅归档失败任务
      failed_only: false
      dir: "/var/lib/etask/script-archive"
      # 归档保留时间
      max_age: 168h
      # 归档最大容量限制
      max_size: "10GB"

executor:
  # 节点实例 ID（优先级：环境变量 EXECUTOR_NODE_ID > 此配置）
  id: "node-01"
  # 任务执行模式：PUSH (主动推送模式) 或 PULL (边缘拉取模式)
  mode: "PULL"
  desc: "通用计算节点：提供 Shell 与 Python 脚本等系统级基础执行能力的默认执行器集群"
  # 资源池隔离级别：SHARED(共享) 或 DEDICATED(专有)
  isolation_level: "SHARED"
  artifact_cache:
    dir: "/var/lib/etask/artifact-cache"
    # 单个压缩制品最大下载限制
    max_download_size: "512MB"
    # 单个制品最大解压限制
    max_unpacked_size: "2GB"
    # 单个制品最大文件数限制
    max_file_count: 10000
    # 本地缓存最大大小限制
    max_cache_size: "10GB"

artifact:
  temp_dir: "/tmp/etask/artifacts"
  # 存储驱动类型：local 或 s3
  storage:
    driver: "local"
    local:
      root: "/var/lib/etask/artifact-store"
    s3:
      endpoint: "http://minio:9000"
      secure: false
      region: "us-east-1"
      bucket: "etask-artifacts"
      prefix: "codebook"
      access_key: ""
      secret_key: ""
      session_token: ""

mysql:
  dsn: "root:123456@tcp(127.0.0.1:3306)/etask?charset=utf8mb4&collation=utf8mb4_general_ci&parseTime=True&loc=Local&timeout=1s&readTimeout=3s&writeTimeout=3s&multiStatements=true&interpolateParams=true"

redis:
  addr: "127.0.0.1:6379"
  password: "1234567890"

encryption:
  version: "V1"
  key: "1234567890"

kafka:
  network: tcp
  addresses:
    - 127.0.0.1:9094

etcd:
  endpoints:
    - 127.0.0.1:2379

web:
  host: "0.0.0.0"
  port: 8765

policy:
  auth_url: http://127.0.0.1:8000

grpc:
  server:
    scheduler:
      name: scheduler
      listen_addr: "0.0.0.0:9002"
      # 广播地址，留空则自动检测
      advertise_addr: ""
      # 身份认证 Token，留空则不启用
      auth_token: ""
    executor:
      name: execute
      listen_addr: "0.0.0.0:9004"
      # 广播地址，留空则自动检测
      advertise_addr: ""
      # 身份认证 Token，留空则不启用
      auth_token: ""
  client:
    scheduler:
      name: "scheduler"

scheduler:
  # 批量获取任务的超时时间（纳秒）
  batchTimeout: 3000000000
  # 每次调度循环扫描的最大任务数
  batchSize: 100
  # 任务抢占超时时间（纳秒）
  preemptedTimeout: 600000000000
  # 核心调度循环间隔（纳秒）
  scheduleInterval: 10000000000
  # 任务续约间隔（纳秒）
  renewInterval: 5000000000
  maxConcurrentTasks: 1000
  # 任务执行令牌获取超时时间（纳秒）
  tokenAcquireTimeout: 3000000000
  # 轮询扫描未处理任务的最小间隔时间（纳秒）
  pollInterval: 1000000000
  # 节点状态和结果上报超时时间（纳秒）
  reportTimeout: 10000000000

compensator:
  retry:
    maxRetryCount: 3
    # 任务准备阶段的超时窗口（纳秒）
    prepareTimeoutWindowMs: 10000000000
    batchSize: 100
    # 重试补偿执行的最小间隔（纳秒）
    minDuration: 1000000000
  reschedule:
    batchSize: 100
    # 重新调度补偿执行的最小间隔（纳秒）
    minDuration: 1000000000
  interrupt:
    batchSize: 100
    # 中断检查补偿执行的最小间隔（纳秒）
    minDuration: 1000000000
