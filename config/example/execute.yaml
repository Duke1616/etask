log:
  debug: true

# 执行节点集群配置
executor:
  # 节点实例 ID。
  # 优先级：环境变量 EXECUTOR_NODE_ID > 此处配置 (executor.id) > grpc.server.executor.id。
  # 注意：系统会自动将其格式化为 {serviceName}:{id}，如 "etask:node-01"，以确保跨服务唯一。
  id: "node-01"
  # 任务执行模式：
  # - PUSH: (默认) 调度中心检测到节点在线后，主动向节点推送任务请求，适用于公网可达的环境。
  # - PULL: 边缘节点模式。节点主动向中心发起长轮询拉取任务，适用于防火墙内或无固定公网 IP 的环境。
  mode: "PULL"
  # 执行器集群功能描述。
  desc: "通用计算节点：提供 Shell 与 Python 脚本等系统级基础执行能力的默认执行器集群"

etcd:
  endpoints:
    - 127.0.0.1:2379

grpc:
  server:
    executor:
      name: execute
      listen_addr: "0.0.0.0:9004" # 服务监听地址
      advertise_addr: ""  # 广播地址，可选,留空则自动检测
      auth_token: "" # 可选：开启认证
  client:
    scheduler:
      name: "scheduler"