version: '3'
services:
  ework-runner:
    restart: always
    container_name: ework-execute
    image: duke1616/ework-runner:latest
    command: ./ework-execute
    ports:
      - 8668:8001
    environment:
      - TZ=Asia/Shanghai
    volumes:
      - ./prod.yaml:/app/config/prod.yaml
      # 启用 Local 制品仓库或 Executor 制品缓存时需要持久化该目录。
      - etask-artifacts:/var/lib/etask

networks:
  default:
    name: ecmdb
    external: true

volumes:
  etask-artifacts:
