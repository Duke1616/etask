syntax = "proto3";

package etask.artifact.v1;

option go_package = "etask/artifact/v1;artifact";

// ArtifactRef 描述一次任务执行固定使用的不可变制品。
message ArtifactRef {
  int64 release_id = 1;
  string digest = 2;
  string blob_checksum = 3;
  int64 size = 4;
  string format = 5;
  int32 format_version = 6;
  reserved 7, 8;
  reserved "scope", "project_id";
  // mount_name 为空表示默认依赖层；非空时表示 Executor 中的具名挂载目录。
  string mount_name = 9;
}

message DownloadArtifactRequest {
  int64 release_id = 1;
  string digest = 2;
}

message ArtifactChunk {
  bytes data = 1;
}

// ArtifactService 为执行节点提供与底层 Local/S3 无关的流式制品下载能力。
service ArtifactService {
  // DownloadArtifact 根据发布记录和内容摘要流式下载不可变制品。
  rpc DownloadArtifact(DownloadArtifactRequest) returns (stream ArtifactChunk);
}
