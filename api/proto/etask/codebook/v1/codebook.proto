syntax = "proto3";

package etask.codebook.v1;

option go_package = "etask/codebook/v1;codebook";

message Codebook {
  int64 id = 1;
  string name = 2;
  string owner = 3;
  string code = 4;
  string secret = 5;
  int64 ctime = 6;
  int64 utime = 7;
}

message GetCodebookByIDRequest {
  int64 id = 1;
}

message GetCodebookByIDResponse {
  Codebook codebook = 1;
}

service CodebookService {
  rpc GetCodebookByID(GetCodebookByIDRequest) returns (GetCodebookByIDResponse);
}
